[build]
  command = "npm run build"
  publish = "dist"

# Payday API calls are routed through a Netlify Function so the OAuth
# credentials stay server-side (never inlined into the client bundle).
# The function lives at netlify/functions/payday.js and reads
# PAYDAY_CLIENT_ID / PAYDAY_CLIENT_SECRET (no VITE_ prefix) from the
# function's environment.
[[redirects]]
  from = "/payday-api/*"
  to = "/.netlify/functions/payday/:splat"
  status = 200
  force = true

# SPA fallback — all unmatched paths serve the React app's index.html.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
